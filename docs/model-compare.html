<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>三模型对比 · 国风炼金</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#12100e;color:#d4c8b8;font-family:"Microsoft YaHei",sans-serif;padding:20px}
h1{font-size:20px;margin-bottom:10px;color:#d4a854}
h2{font-size:14px;margin:24px 0 10px;color:#a09070;border-bottom:1px solid #2a2218;padding-bottom:5px}
.card-row{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.card-row .info{width:100px;font-size:12px;color:#a09070;padding-top:50px;text-align:right}
.card-row img{width:200px;border-radius:4px;border:1px solid #2a2218}
.card-row .label{font-size:11px;color:#706050;text-align:center;margin-top:4px}
.model-col{flex:1}
.best{border-color:#d4a854!important;box-shadow:0 0 8px rgba(212,168,84,0.3)}
.nav{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.nav a{padding:4px 12px;border:1px solid #2a2218;border-radius:4px;color:#a09070;text-decoration:none;font-size:13px}
.nav a:hover,.nav a.on{background:#d4a854;color:#12100e;border-color:#d4a854}
.page{display:none}
.page.on{display:block}
.legend{display:flex;gap:20px;margin-bottom:20px;font-size:13px;color:#a09070}
.legend span{padding:2px 8px;border-left:3px solid}
.legend .l1{border-color:#7050c0}
.legend .l2{border-color:#d4a854}
.legend .l3{border-color:#60a0d0}
</style>
</head>
<body>

<h1>🎨 三模型对比 · 20张地点卡</h1>

<div class="legend">
<span class="l1">Animagine XL 4.0</span>
<span class="l2">GuoFeng4.1_2.5D</span>
<span class="l3">Juggernaut-XL v9</span>
</div>

<div class="nav" id="nav"></div>

<div id="pages"></div>

<script>
const cards = [
  ["LJ-L-0001-L01","建康","LJ"],["LJ-L-0002-L01","洛阳","LJ"],["LJ-L-0003-L01","金陵","LJ"],["LJ-L-0004-L01","邺城","LJ"],["LJ-L-0005-L01","平城","LJ"],["LJ-L-0006-L01","姑臧","LJ"],
  ["MQ-L-0001-L01","北京城","MQ"],["MQ-L-0002-L01","南京","MQ"],["MQ-L-0003-L01","山海关","MQ"],["MQ-L-0004-L01","紫禁城","MQ"],["MQ-L-0005-L01","十三陵","MQ"],["MQ-L-0006-L01","承德避暑山庄","MQ"],
  ["QH-L-0003-L01","函谷关","QH"],["QH-L-0004-L01","咸阳","QH"],["QH-L-0005-L01","彭城","QH"],["QH-L-0006-L01","汉中","QH"],["QH-L-0007-L01","骊山","QH"],["QH-L-0008-L01","陈仓","QH"],["QH-L-0009-L01","灞上","QH"],
  ["SG-L-0001-L01","赤壁","SG"]
];

const base = "/assets-output/cards/model-tests/";
const nav = document.getElementById("nav");
const pages = document.getElementById("pages");

	const loaded = {};

	function loadImages(pageEl, id) {
	  if (loaded[id]) return;
	  [ ["animagine","Animagine XL","l1"],
	    ["guofeng","GuoFeng4.1","l2"],
	    ["juggernaut","Juggernaut XL","l3"]
	  ].forEach(([tag, label, cls]) => {
	    const col = document.createElement("div");
	    col.className = "model-col";
	    const img = document.createElement("img");
	    img.src = base + id + "_" + tag + ".png";
	    img.onerror = function(){ this.src = ""; this.alt = "no image"; };
	    const lbl = document.createElement("div");
	    lbl.className = "label " + cls;
	    lbl.textContent = label;
	    col.appendChild(img);
	    col.appendChild(lbl);
	    pageEl.querySelector(".card-row").appendChild(col);
	  });
	  loaded[id] = true;
	}

	function load() {
	  cards.forEach(([id, name, era], i) => {
	    const page = document.createElement("div");
	    page.className = "page" + (i === 0 ? " on" : "");
	    page.id = "p" + i;

	    const h2 = document.createElement("h2");
	    h2.textContent = (i+1) + ". " + name + " (" + id + ")";
	    page.appendChild(h2);

	    const row = document.createElement("div");
	    row.className = "card-row";
	    page.appendChild(row);
	    pages.appendChild(page);

	    const a = document.createElement("a");
	    a.href = "#";
	    a.textContent = (i+1) + "." + name;
	    a.onclick = function(e){
	      e.preventDefault();
	      document.querySelectorAll(".page").forEach(p => p.className = "page");
	      const target = document.getElementById("p" + i);
	      target.className = "page on";
	      loadImages(target, id);
	      document.querySelectorAll(".nav a").forEach(x => x.className = "");
	      a.className = "on";
	    };
	    if (i === 0) a.className = "on";
	    nav.appendChild(a);
	  });

	  // 只预加载第一张卡
	  loadImages(document.getElementById("p0"), cards[0][0]);
	}
	load();
</script>
</body>
</html>
